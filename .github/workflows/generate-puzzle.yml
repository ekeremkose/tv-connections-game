name: Generate Daily Puzzle

on:
  schedule:
    # Her gün saat 21:00 UTC = gece yarısı Türkiye saati (UTC+3)
    - cron: '0 21 * * *'
  workflow_dispatch:
    # GitHub Actions sayfasından elle de tetiklenebilir
    inputs:
      date:
        description: 'Specific date (YYYY-MM-DD). Leave empty for today.'
        required: false

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate puzzle
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            npm run generate:puzzle -- --date ${{ github.event.inputs.date }}
          else
            npm run generate:puzzle
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/puzzles/
          git diff --staged --quiet && echo "No new puzzle to commit." || (
            git commit -m "puzzle $(date -u +%Y-%m-%d)" &&
            git push
          )
